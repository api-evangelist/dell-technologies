specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Dell Technologies
providerId: dell-technologies
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Dell does not publish a single canonical rate-limit table for developer.dell.com. Limits exist
  per-product (e.g. iDRAC Redfish has device-level concurrency limits, OpenManage Enterprise enforces
  per-user session and operation limits, PowerStore enforces array-level connection caps). Actual numbers
  must be sourced from the relevant product API reference.
tags:
  - Enterprise IT
  - Infrastructure
  - Servers
  - Storage
  - Cloud
  - Rate Limiting
description: Rate limits are scoped per Dell product API and per-device / per-array rather than per-developer-account.
  iDRAC Redfish limits concurrent sessions on the management controller; OpenManage Enterprise limits
  per-user concurrent operations; PowerStore limits per-array session and request concurrency. Consult
  the relevant product API reference for canonical numbers.
sources:
  - https://developer.dell.com/apis
responseCodes:
  throttled: 429
  quotaExceeded: 429
  serviceUnavailable: 503
limits:
  - tier: product
    name: Per-Product Concurrency
    scope: device-or-array
    metric: varies
    limit: 'see product-specific API reference'
    applies:
      - Dell Technologies API
policies:
  - name: Per-Product Limits
    description: Each Dell product API (iDRAC Redfish, OpenManage Enterprise, PowerStore, etc.) enforces
      its own session, concurrency, and operation limits at the device or array level. Refer to the relevant
      product API reference for canonical values.
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter, honoring Retry-After when present.
  - name: Session Management
    description: Several Dell management APIs require explicit session creation and cleanup; long-lived
      sessions can consume the per-device session pool and trigger 503 / connection refusal.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
