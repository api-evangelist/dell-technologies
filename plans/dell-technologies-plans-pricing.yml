specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Dell Technologies
providerId: dell-technologies
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Dell Technologies does not publish per-call API pricing for the developer.dell.com API portfolio.
  API access is generally tied to the underlying Dell product entitlement (e.g. APEX subscription, PowerEdge
  iDRAC license, OpenManage Enterprise, PowerStore array, Dell Premier purchasing account). Pricing is
  negotiated through Dell sales / channel partners rather than self-serve API tiers.
tags:
  - Enterprise IT
  - Infrastructure
  - Servers
  - Storage
  - Cloud
  - Automation
description: Dell does not operate a self-serve developer pricing model. Public APIs (PowerEdge / iDRAC
  Redfish, OpenManage Enterprise, PowerStore, Premier B2B, APEX) are bundled with the Dell product or
  service that the API manages. APEX cloud subscriptions are quoted per-configuration. This artifact retains
  a single entitlement-bundled plan stub pending direct contract reconciliation.
sources:
  - https://developer.dell.com/apis
  - https://www.dell.com/en-us/dt/apex/index.htm
plans:
  - id: dell-technologies-product-bundled
    name: Product-Bundled API Access
    type: enterprise
    description: API access is included with the corresponding Dell product entitlement (PowerEdge / iDRAC,
      OpenManage Enterprise, PowerStore, APEX cloud subscription, Premier purchasing account). No separate
      API fee.
    entries:
      - label: Bundled API Access
        description: Use of the API is governed by the underlying Dell product license / subscription.
        name: bundled_api_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://developer.dell.com/apis
        unit: 1
        price: included with product
        userMultiplied: false
      - label: APEX Subscription
        description: Dell APEX consumption-based cloud subscription; configured and quoted per-engagement.
        name: apex_subscription
        type: flat
        metric: varies
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://developer.dell.com/apis
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: PowerEdge / iDRAC Redfish API
      - name: OpenManage Enterprise API
      - name: PowerStore Management API
      - name: Premier B2B Procurement API
      - name: APEX Cloud Services API
      - name: Dell Technologies API
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
