specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Dell Technologies
providerId: dell-technologies
publisherName: Dell Technologies Inc.
serviceCategory: Enterprise IT / Infrastructure
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
notes: Dell APIs (Redfish / iDRAC, OpenManage, PowerStore, Premier, APEX) are billed indirectly via the
  underlying product entitlement or APEX consumption subscription. There is no per-API-call price; FinOps
  shape follows hardware lifecycle plus APEX consumption metering. Reconcile against APEX subscription
  invoices when available.
tags:
  - Enterprise IT
  - Infrastructure
  - Servers
  - Storage
  - APEX
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Dell Technologies APIs. Bundled-with-product economics for management
  APIs (iDRAC, OpenManage, PowerStore) plus APEX consumption-based subscription metering for cloud and
  as-a-service offerings.'
sources:
  - https://developer.dell.com/apis
  - https://www.dell.com/en-us/dt/apex/index.htm
principles:
  - name: Visibility
    description: For APEX consumption, use the APEX Console / APEX Cloud Services dashboards to track
      capacity-on-demand metering (storage GB, instance-hours, data services). For on-prem product APIs,
      observe at the device / array level via OpenManage Enterprise telemetry.
  - name: Allocation
    description: Allocate APEX subscription costs to the consuming workload via APEX subscription tags;
      allocate on-prem device usage by service tag and asset record from Dell Premier inventory.
  - name: Optimization
    description: Right-size APEX subscriptions against actual capacity utilization; consolidate iDRAC
      management traffic and OpenManage automation jobs to avoid licensing extra OME instances; review
      data services and replication add-ons.
  - name: Accountability
    description: Asset owners track hardware lifecycle cost; APEX subscription owners track consumption
      drift; route invoice anomalies through Dell account team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Hardware Entitlement + APEX Consumption Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: Dell Technologies API
  ServiceCategory: Enterprise IT / Infrastructure
  ProviderName: Dell Technologies
  PublisherName: Dell Technologies Inc.
  InvoiceIssuerName: Dell Technologies Inc.
  PricingCategory: Subscription + Hardware
  PricingUnit: varies
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: apex_capacity
    description: APEX storage / compute capacity reserved (committed) and on-demand
    unit: GB
    aggregation: max
    dimensions:
      - subscription
      - product
      - region
  - name: apex_consumption
    description: APEX consumption-based metered usage above commitment
    unit: varies
    aggregation: sum
    dimensions:
      - subscription
      - product
      - region
  - name: support_subscription
    description: ProSupport / ProSupport Plus / Keep Your Hard Drive entitlements
    unit: month
    aggregation: sum
    dimensions:
      - service_tag
      - service_level
  - name: management_seat
    description: OpenManage Enterprise advanced license seats
    unit: seat
    aggregation: max
    dimensions:
      - product
apis:
  - name: Dell Technologies API
    baseURL: https://developer.dell.com/apis
    tags:
      - Enterprise IT
      - Infrastructure
      - Servers
      - Storage
      - PowerEdge
      - PowerStore
      - OpenManage
    serviceName: Dell Technologies API
    serviceCategory: API
unitEconomics:
  - name: Cost per APEX-managed TB-month
    metric: apex_subscription_cost / managed_tb_months
    target: TBD
  - name: Cost per Managed Asset
    metric: support_cost / active_service_tags
    target: TBD
